<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI</title>
  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6c63ff"/>
          <stop offset="100%" stop-color="#00c2ff"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#g)"/>
      <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="28" font-weight="800"
        letter-spacing="-1" fill="white">AI</text>
    </svg>`;

    // 1. SVG link
    const svgUrl = 'data:image/svg+xml,' + encodeURIComponent(svg);
    document.head.insertAdjacentHTML('beforeend',
      `<link rel="icon" type="image/svg+xml" href="${svgUrl}">`);

    // 2. SVG → PNG via canvas, then inject as link
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 64;
      canvas.getContext('2d').drawImage(img, 0, 0, 64, 64);
      const pngUrl = canvas.toDataURL('image/png');

      document.head.insertAdjacentHTML('beforeend',
        `<link rel="icon" type="image/png" sizes="32x32" href="${pngUrl}">`);
      document.head.insertAdjacentHTML('beforeend',
        `<link rel="apple-touch-icon" href="${pngUrl}">`);
    };
    img.src = svgUrl;
  </script>
</head>
<body></body>
</html>
